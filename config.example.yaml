# loop-bilibili 配置模板
# 复制为 config.yaml 后按需修改（config.yaml 已 gitignore）
# 当前版本以 CLI --profile 为主；此文件预留扩展。

paths:
  catalogs_dir: catalogs
  logs_dir: logs

# 默认限速（与 packages/loop_core/rate_limit.py 中 conservative 对齐）
rate_limit:
  default_profile: conservative
  # list: page_delay ~1.5s; item: item_delay ~3s mild (always serial, no concurrency)
  # page_size: 30
  # page_delay: 1.5
  # item_delay: 3.0
  # item_jitter: 1.0
  # max_retries: 5
  # cooldown_412: 300

modules:
  catalog:
    enabled: true
  hot:
    enabled: true
  ranking:
    enabled: true
  search:
    enabled: true
  feed:
    enabled: true
  summary:
    enabled: true
  subtitle:
    enabled: true
  comments:
    enabled: true
